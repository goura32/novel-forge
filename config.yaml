# NovelForge 設定ファイル
#
# 環境変数 NOVEL_FORGE_CONFIG でパスを指定可能。
# 未指定の場合はカレントディレクトリから親へ辿って自動検出。
#
# config.yaml が存在しない場合はコード内のデフォルト値が使用される。
#
# OLLAMA_OPTIONS 環境変数は config.yaml よりも優先される（オーバーレイ）。

llm:
  # モデル名
  model: "qwen3.6:35b-a3b-mtp-q4_K_M"

  # 出力トークン数上限（16384 = 16K）
  # ベンチマーク確定値: qwen3.6 + think=false で 1024〜16384 全スケール100%成功
  num_predict: 16384

  # コンテキスト長（null = モデル自動検出）
  # GPU メモリ不足の場合は小さくする（例: 8192, 16384）
  # ws1.local の GPU では 4096 が安定動作の目安
  num_ctx: 65536

  # API タイムアウト（秒）
  timeout_seconds: 3600

  # リトライ回数
  max_retries: 2

  # Ollama ホスト（OLLAMA_HOST 環境変数より優先）
  # ollama_host: "ws1.local:11434"

  # Ollama サンプリングオプション（公式推奨値）
  ollama_options:
    temperature: 0.7
    top_k: 20
    top_p: 0.80
    repeat_penalty: 1.0
    presence_penalty: 1.5
