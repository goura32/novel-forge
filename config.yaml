# NovelForge 設定ファイル
#
# 環境変数 NOVEL_FORGE_CONFIG でパスを指定可能。
# 未指定の場合はカレントディレクトリから親へ辿って自動検出。
#
# config.yaml が存在しない場合はコード内のデフォルト値が使用される。
#
# OLLAMA_OPTIONS 環境変数は config.yaml よりも優先される（オーバーレイ）。

# 品質ゲート設定
quality:
  # 生成API（APIエラー＋バリデーション）の最大リトライ回数
  # 必須キー欠落やキー名タイポ等の LLM 出力揺らぎはシード値リトライで吸収するため、余裕を持たせる
  max_generation_count: 10

  # レビュー（レビュー→修正サイクル）の最大回数
  max_review_count: 3

llm:
  # モデル名
  model: "qwen3.6:35b-a3b-mtp-q4_K_M"

  # 出力トークン数上限（-1 = 無制限）
  num_predict: -1

  # コンテキスト長（262144 = qwen3.6:35b の最大値）
  num_ctx: 262144

  # API タイムアウト（秒）
  timeout_seconds: 3600

  # 通信リトライ回数（一時的な LLM API エラーのみ）
  # JSON/schema 出力不備の再生成は quality.max_generation_count で制御する
  transport_retries: 2

  # Ollama ホスト（OLLAMA_HOST 環境変数より優先）
  ollama_host: "ws1.local:11434"

  # Ollama サンプリングオプション
  ollama_options:
    think: false
    temperature: 0.7
    top_p: 0.9
