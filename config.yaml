# NovelForge 設定ファイル
#
# 環境変数 NOVEL_FORGE_CONFIG でパスを指定可能。
# 未指定の場合はカレントディレクトリから親へ辿って自動検出。
#
# config.yaml が存在しない場合はコード内のデフォルト値が使用される。
#
# OLLAMA_OPTIONS 環境変数は config.yaml よりも優先される（オーバーレイ）。

llm:
  # モデル名
  model: "qwen3.6:35b-a3b-mtp-q4_K_M"

  # 出力トークン数上限（65536 = 64K）
  num_predict: 65536

  # コンテキスト長（null = モデル自動検出）
  num_ctx: null

  # API タイムアウト（秒）
  timeout_seconds: 600

  # リトライ回数
  max_retries: 2

  # Ollama ホスト（OLLAMA_HOST 環境変数より優先）
  # ollama_host: "ws1.local:11434"

  # Ollama サンプリングオプション
  # temperature, top_p, top_k, repeat_penalty 等を指定可能
  # ollama_options:
  #   temperature: 0.7
  #   top_p: 0.9
  #   top_k: 40
  #   repeat_penalty: 1.1
