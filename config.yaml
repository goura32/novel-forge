# Development template. Runtime reads only ~/.config/novel-forge/config.yaml.
# Unknown or retired keys fail configuration validation.

workspace:
  root: "/mnt/hdd/novel"

quality:
  # Total LLM attempts including the first call. JSON/schema failures only.
  max_generation_attempts: 3

llm:
  model: "qwen3.6:35b-a3b-mtp-q4_K_M"
  ollama_host: "127.0.0.1:11434"
  timeout_seconds: 3600
  num_predict: -1
  num_ctx: 262144
  ollama_options:
    think: true
    temperature: 1.0
    top_p: 0.95
    top_k: 20
    min_p: 0.0

logging:
  level: "INFO"

verbose: false
