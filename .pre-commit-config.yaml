repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.13.4
          - rich>=15.0.0
          - typer>=0.12
          - httpx>=0.28.1
          - jsonschema>=4.26.0
          - pyyaml>=6.0.3
        args: [--ignore-missing-imports]
