# NovelForge example configuration.
#
# Copy this file to ~/.config/novel-forge/config.yaml.
# NovelForge reads only that canonical runtime configuration path.
# Runtime precedence: CLI options > canonical config > built-in defaults.

quality:
  # Maximum generation attempts per phase/scene, including API and schema validation failures.
  max_generation_count: 4

  # Maximum review -> revision cycles.
  max_review_count: 4

llm:
  # Ollama model name.
  model: "qwen3.6:35b-a3b-mtp-q4_K_M"

  # Maximum generated tokens. -1 means unlimited for Ollama models that support it.
  num_predict: -1

  # Context length. Adjust to the selected model and available VRAM/RAM.
  num_ctx: 262144

  # API timeout in seconds. Long-form generation can take a while on local models.
  timeout_seconds: 3600

  # Transport retry count for transient LLM API errors only.
  # JSON/schema output failures are controlled by quality.max_generation_count.
  transport_retries: 2

  # Ollama host. Can also be provided with OLLAMA_HOST when not set here.
  ollama_host: "localhost:11434"

  # Passed to Ollama's options payload, except `think` which is sent as top-level `think`.
  ollama_options:
    think: false
    temperature: 1.0
    top_p: 0.95
    top_k: 20
    min_p: 0.0

# Logging / output controls.
## `verbose` also enables LLM raw logs (transport, JSON payload, parse traces).
