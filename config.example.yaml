# NovelForge example configuration.
# Copy this file to ~/.config/novel-forge/config.yaml.
# NovelForge reads only this canonical path. Unknown or retired keys are errors.

workspace:
  # Set this or pass --workdir to each command.
  root: "/path/to/novels"

quality:
  # Total LLM attempts for one task, including the first attempt.
  # Only JSON/schema contract failures retry. Transport failures never retry.
  max_generation_attempts: 3

llm:
  model: "qwen3.6:35b-a3b-mtp-q4_K_M"
  ollama_host: "ws1.local:11434"
  timeout_seconds: 3600
  num_predict: -1
  num_ctx: 262144
  ollama_options:
    think: false
    temperature: 1.0
    top_p: 0.95
    top_k: 20
    min_p: 0.0

logging:
  level: "INFO"

verbose: false
